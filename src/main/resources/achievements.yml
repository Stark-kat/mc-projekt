# ============================================================
#   achievements.yml — Definicje osiągnięć z progresywnymi progami
# ============================================================
#
# Triggery: BREAK_BLOCK | KILL_MOB | FISH | CRAFT_ITEM | PLACE_BLOCK | SMELT_ITEM
#            TRADE | SEND_CHAT | INVITE_MEMBER | VISIT_ISLAND | AUCTION_SOLD | AUCTION_WON
#            UNLOCK_NETHER | EAT_FOOD | SURVIVE_FALL | COMPLETE_DAILY_QUEST_SET
#            COMPLETE_WEEKLY_QUEST_SET | OPEN_CRATE | UPGRADE_GENERATOR
#            SELL_TO_SHOP | EXPAND_ISLAND
#
# target: nazwa materiału/entity lub "" = dowolny
# tiers:  kolejne progi; klucze (1, 2, 3...) MUSZĄ być posortowane
#         rosnąco po polu "amount" — plugin sam to gwarantuje
# ============================================================

achievements:

  # --- TUTORIAL ---

  # Przykład osiągnięcia MULTI-TARGET:
  # Gracz musi skraftować stół rzemieślniczy, piec i skrzynię — w dowolnej kolejności.
  # Każdy tier może mieć własny zestaw wymagań (tu: ten sam zestaw z rosnącymi ilościami).
  #
  # Format multi-target: zamiast "target" + "amount" w tierze używamy sekcji "targets":
  #   targets:
  #     MATERIAL_NAME: wymagana_ilosc
  #

